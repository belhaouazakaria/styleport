name: Deploy to Hostinger

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  ci:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      APP_BASE_URL: https://translators.example.com
      NEXTAUTH_SECRET: test_nextauth_secret_please_replace
      NEXTAUTH_URL: https://translators.example.com
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: test_key
      OPENAI_MODEL: gpt-4.1-mini
      NEXT_PUBLIC_APP_NAME: StylePort
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: test_site_key
      TURNSTILE_SECRET_KEY: test_turnstile_secret
      IP_HASH_SECRET: test_ip_hash_secret_value_123456
      ALERT_ADMIN_EMAIL: alerts@example.com
      EMAIL_FROM: StylePort Alerts <alerts@example.com>
      RESEND_API_KEY: test_resend_key

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate production env contract
        run: npm run validate:env:production

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Apply Prisma migrations to production database
        run: npm run prisma:deploy

      - name: Build
        run: npm run build

      - name: Prune dev dependencies for production release
        run: npm prune --omit=dev --ignore-scripts

      - name: Create deploy bundle
        run: |
          set -eu
          tar -czf release.tar.gz \
            .next \
            public \
            prisma \
            node_modules \
            package.json \
            package-lock.json \
            next.config.ts \
            server.js \
            next-env.d.ts

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: hostinger-release
          path: release.tar.gz
          retention-days: 1

  deploy:
    name: Production Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: production
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: hostinger-release
          path: .

      - name: Validate deploy configuration
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST || vars.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER || vars.HOSTINGER_SSH_USER }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT || vars.HOSTINGER_SSH_PORT }}
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          APP_PATH: ${{ secrets.HOSTINGER_APP_PATH || vars.HOSTINGER_APP_PATH }}
        run: |
          set -eu
          missing=""
          [ -n "$SSH_HOST" ] || missing="$missing HOSTINGER_SSH_HOST"
          [ -n "$SSH_USER" ] || missing="$missing HOSTINGER_SSH_USER"
          [ -n "$SSH_PORT" ] || missing="$missing HOSTINGER_SSH_PORT"
          [ -n "$SSH_KEY" ] || missing="$missing HOSTINGER_SSH_PRIVATE_KEY"
          [ -n "$APP_PATH" ] || missing="$missing HOSTINGER_APP_PATH"
          if [ -n "$missing" ]; then
            echo "::error::Missing deploy configuration:$missing"
            exit 1
          fi

      - name: Upload application files to Hostinger
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST || vars.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER || vars.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || vars.HOSTINGER_SSH_PORT }}
          source: >-
            release.tar.gz,scripts/hostinger-deploy.sh
          target: ${{ secrets.HOSTINGER_APP_PATH || vars.HOSTINGER_APP_PATH }}
          overwrite: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST || vars.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER || vars.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || vars.HOSTINGER_SSH_PORT }}
          script_stop: true
          command_timeout: 40m
          script: |
            set -eu
            cd ${{ secrets.HOSTINGER_APP_PATH || vars.HOSTINGER_APP_PATH }}
            echo "[gha][ssh] pwd=$(pwd)"
            echo "[gha][ssh] listing current directory"
            ls -la
            echo "[gha][ssh] listing scripts directory"
            ls -la scripts || true
            command -v bash >/dev/null 2>&1 || { echo "[gha][ssh][error] bash not found"; exit 1; }
            chmod +x ./scripts/hostinger-deploy.sh
            HOSTINGER_DEPLOY_DEBUG=1 HOSTINGER_DEPLOY_ARCHIVE="${{ secrets.HOSTINGER_APP_PATH || vars.HOSTINGER_APP_PATH }}/release.tar.gz" bash ./scripts/hostinger-deploy.sh
